<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Vida & Saúde - ADS</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f9ff; }
        header { background-color: #004a99; color: white; padding: 1rem; text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .section-title { color: #004a99; border-bottom: 2px solid #004a99; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        /* Ajuste para garantir que a imagem apareça */
        .card img { width: 100%; height: 200px; object-fit: cover; display: block; background-color: #ddd; }
        .card-content { padding: 15px; }
        form { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background-color: #004a99; color: white; font-weight: bold; cursor: pointer; border: none; }
    </style>
</head>
<body>

<header>
    <h1>Clínica Vida & Saúde</h1>
    <p>Projeto Acadêmico - ADS</p>
</header>

<div class="container">
    <h2 class="section-title">Nossos Serviços</h2>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1519494026892-80bbd2d6fd0d?q=80&w=500" alt="Consultas Médicas">
            <div class="card-content"><h3>Consultas Médicas</h3></div>
        </div>
        <div class="card">
            <img src="https://www.diagnosticosdobrasil.com.br/uploads/images/2025/08/exames-laboratoriais-tudo-o-que-voce-precisa-saber-1754006893.jpg" alt="Exames">
            <div class="card-content"><h3>Exames Laboratoriais</h3></div>
        </div>
    </div>

    <h2 class="section-title">Nossa Equipe</h2>
    <div class="grid">
        <div class="card">
            <img src="https://telemedicinamorsch.com.br/wp-content/uploads/2018/05/carreira-medica.jpg" alt="Médica">
            <div class="card-content">
                <h3>Dra. Ana Costa</h3>
                <p>Cardiologista</p>
            </div>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1622253692010-333f2da6031d?q=80&w=500" alt="Médico">
            <div class="card-content">
                <h3>Dr. Lucas Pinho</h3>
                <p>Pediatra</p>
            </div>
        </div>
    </div>

    <h2 class="section-title">Agendamento</h2>
    <form>
        <input type="text" placeholder="Nome Completo" required>
        <input type="email" placeholder="E-mail" required>
        <input type="text" placeholder="Cidade">
        <select required>
            <option value="">Selecione o Estado</option>
            <option value="DF">Distrito Federal</option>
            <option value="GO">Goiás</option>
            <option value="AM">Amazonas</option>
        </select>
        <button type="submit">Solicitar Contato</button>
    </form>
</div>

</body>
</html>
