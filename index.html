<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínica Vida & Saúde</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: #333; }
        header { background-color: #0056b3; color: white; padding: 20px; text-align: center; }
        section { padding: 20px; max-width: 1000px; margin: auto; }
        .grid { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; width: 250px; text-align: center; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card h3 { color: #0056b3; padding: 10px; }
        form { display: flex; flex-direction: column; gap: 10px; max-width: 400px; margin: auto; }
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #0056b3; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Clínica Vida & Saúde</h1>
</header>

<section id="servicos">
    <h2>Nossos Serviços</h2>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1505751172107-597d5a4d4b1b?auto=format&fit=crop&w=500" alt="Consultas">
            <h3>Consultas Médicas</h3>
        </div>
        <div class="card">
            <img src="https://images.unsplash.com/photo-1579152276507-24a3264ec5a8?auto=format&fit=crop&w=500" alt="Exames">
            <h3>Exames Laboratoriais</h3>
        </div>
    </div>
</section>

<section id="equipe">
    <h2>Nossa Equipe</h2>
    <div class="grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?auto=format&fit=crop&w=500" alt="Médico">
            <h3>Dr. Roberto Silva</h3>
            <p>Clínico Geral</p>
        </div>
    </div>
</section>

<section id="contato">
    <h2>Entre em Contato</h2>
    <form>
        <input type="text" placeholder="Nome Completo" required>
        <input type="email" placeholder="E-mail" required>
        <input type="text" placeholder="Cidade">
        <select>
            <option value="">Selecione o Estado</option>
            <option value="DF">Distrito Federal</option>
            <option value="GO">Goiás</option>
        </select>
        <button type="submit">Enviar</button>
    </form>
</section>

</body>
</html>
